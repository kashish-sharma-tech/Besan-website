<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D1B0E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7941D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)" rx="24"/>
  <rect x="20" y="20" width="360" height="460" fill="none" stroke="#FFD700" stroke-width="3" rx="18" stroke-dasharray="12,6"/>
  <!-- Top brown bar -->
  <rect x="0" y="0" width="400" height="80" fill="#2C1005" rx="24"/>
  <rect x="0" y="60" width="400" height="20" fill="#2C1005"/>
  <!-- NRS Badge -->
  <ellipse cx="200" cy="160" rx="100" ry="70" fill="#2C1005"/>
  <ellipse cx="200" cy="160" rx="94" ry="64" fill="none" stroke="#FFD700" stroke-width="3"/>
  <text x="200" y="148" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="900" fill="white">NRS</text>
  <text x="200" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#FFD700" font-style="italic">Premium Quality</text>
  <!-- Hindi text -->
  <text x="200" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="#FFD700">चना बेसन</text>
  <!-- Sub text -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white">LOW OIL ABSORB CHANA DAL</text>
  <text x="200" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Made From 100% Chana Dal</text>
  <!-- Size badge -->
  <circle cx="340" cy="350" r="42" fill="#2C1005" stroke="#FFD700" stroke-width="3"/>
  <text x="340" y="345" text-anchor="middle" font-family="Georgia,serif" font-size="20" font-weight="900" fill="white">30</text>
  <text x="340" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#FFD700" font-weight="700">Kg</text>
  <!-- Bottom bar -->
  <rect x="0" y="430" width="400" height="70" fill="#2C1005" rx="0"/>
  <rect x="0" y="430" width="400" height="70" fill="#2C1005"/>
  <rect x="0" y="476" width="400" height="24" fill="#2C1005" rx="0"/>
  <rect x="0" y="476" width="400" height="24" rx="24" fill="#2C1005"/>
  <text x="200" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="white">MARKETED BY: NRS FOOD PRODUCT</text>
  <text x="200" y="472" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#FFD700">KANPUR (UTTAR PRADESH) · 7052111911</text>
  <!-- New Pack label -->
  <rect x="20" y="100" width="90" height="28" fill="#F7941D" rx="6"/>
  <text x="65" y="119" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="white">New Pack</text>
  <!-- India flag dot -->
  <rect x="355" y="95" width="22" height="14" fill="#138808" rx="2"/>
  <rect x="355" y="95" width="22" height="5" fill="#FF9933" rx="2"/>
  <rect x="355" y="104" width="22" height="5" fill="#138808" rx="2"/>
  <rect x="355" y="95" width="22" height="4" fill="white" opacity="0"/>
  <circle cx="366" cy="102" r="3" fill="#000080" opacity="0.6"/>
</svg>
